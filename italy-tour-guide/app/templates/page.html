{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>{{ title }}</h1>
    </div>
</section>

<section class="page-content">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <article class="article-content">
                    {{ content|safe }}
                </article>
            </div>
        </div>
    </div>
</section>
{% endblock %}
